<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9ecd, #a8e6a3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .images-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 80px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .images-container a img {
            width: 400px;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .images-container a img:hover {
            transform: scale(1.07);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
    </style>
</head>
<style>
        @font-face {
            font-family: Moonlight;
            src: url("moonlight.woff2");
        }

        h1 {
            color: rgb(228, 102, 126);
            font-size: 400%;
            text-align: center;
        }
    </style>
<body>

        WHAT DO YOU WANNA DO TODAY?

</body>
</html>
